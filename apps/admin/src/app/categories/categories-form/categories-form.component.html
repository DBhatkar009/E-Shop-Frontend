<p-toast />
<div class="admin-page">
    <div class="card flex justify-content-center">
        <p-card [header]="editMode ? 'Edit Category' : 'Category-Form'" subheader="You can Create & Edit Categories">
            <div class="grid">
                <div class="col">
                    <p-toolbar>
                        <div class="p-toolbar-group-left"></div>
                        <div class="p-toolbar-group-right">
                            <p-button
                                [label]="editMode ? 'Update' : 'Create'"
                                icon="pi pi-plus"
                                [rounded]="true"
                                class="mr-2 min-w-0 border-round"
                                size="small"
                                (click)="onSubmit()"
                                severity="success"
                            />
                            <p-button label="Cancel" icon="pi pi-arrow-circle-left" class="mr-2" size="small" (click)="onCancel()" severity="danger" />
                        </div>
                    </p-toolbar>
                </div>
            </div>

            <div class="formgrid grid p-fluid pt-4" [formGroup]="categoryForm">
                <div class="field col-6">
                    <label for="name">Name</label>
                    <input id="name" formControlName="name" type="text" pInputText />
                    <small *ngIf="categoryFormControls['name'].invalid && isSubmitted" class="p-error">name required</small>
                </div>
                <div class="field col-4">
                    <label for="icon">Icon</label>
                    <input id="icon" formControlName="icon" type="text" pInputText />
                    <small *ngIf="categoryFormControls['icon'].invalid && isSubmitted" class="p-error">icon required</small>
                </div>
                <div class="field col">
                    <label for="color">Color</label> <br />
                    <p-colorPicker formControlName="color" />
                </div>
            </div>
        </p-card>
    </div>
</div>
