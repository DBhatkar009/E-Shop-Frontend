<p-toast />
<div class="admin-page">
    <div class="card flex justify-content-center">
        <p-card header="Categories" subheader="List Of Categories">
            <div class="grid">
                <div class="col">
                    <p-toolbar>
                        <div class="p-toolbar-group-left">
                            <p-button routerLink="category-form" label="New" icon="pi pi-plus" class="mr-2" severity="success" />
                        </div>
                    </p-toolbar>
                </div>
            </div>
            <div class="grid">
                <div class="col">
                    <p-table [value]="categories" styleClass="p-datatable-striped" [tableStyle]="{ 'min-width': '50rem' }">
                        <ng-template pTemplate="header">
                            <tr>
                                <th>id</th>
                                <th>Name</th>
                                <th>icon</th>
                                <th></th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-category>
                            <tr>
                                <td>{{ category._id }}</td>
                                <td>{{ category.name }}</td>
                                <td>{{ category.icon }}</td>
                                <td>
                                    <p-button icon="pi pi-trash" (click)="deleteCategory(category._id)" size="small" class="mr-2" severity="danger" />
                                    <p-button icon="pi pi-pencil" class="mr-2" size="small" severity="success" />
                                </td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>
        </p-card>
    </div>
</div>

<p-confirmDialog />
