<p-toast />

<div class="admin-page">
    <div class="card flex justify-content-center">
        <p-card header="Users" subheader="Manage your Users">
            <div class="grid">
                <div class="col">
                    <p-toolbar>
                        <div class="p-toolbar-group-left">
                            <p-button routerLink="users-form" label="New" icon="pi pi-plus" class="mr-2" severity="success" />
                        </div>
                    </p-toolbar>
                </div>
            </div>

            <div class="grid">
                <div class="col">
                    <p-table [value]="users" styleClass="p-datatable-striped" [tableStyle]="{ 'min-width': '50rem' }">
                        <ng-template pTemplate="header">
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>is Admin</th>
                                <th>Zip Code</th>
                                <th>Country</th>
                                <th></th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-user>
                            <tr>
                                <td>{{ user.name }}</td>
                                <td>{{ user.email }}</td>
                                <td>
                                    <p-tag *ngIf="user.isAdmin" icon="pi pi-user" severity="success" value="Admin" [rounded]="true" />
                                    <p-tag *ngIf="!user.isAdmin" icon="pi pi-user" severity="danger" value="Not-Admin" [rounded]="true" />
                                </td>
                                <td>{{ user.zip }}</td>
                                <td>{{ user.country }}</td>
                                <td>
                                    <p-button icon="pi pi-trash" (click)="deleteUser(user._id)" size="small" class="mr-2" severity="danger" />
                                    <p-button icon="pi pi-pencil" (click)="updateUser(user._id)" class="mr-2" size="small" severity="success" />
                                </td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>
        </p-card>
    </div>
</div>

<p-confirmDialog />
