<p-toast />
<div class="admin-page">
    <div class="card flex justify-content-center">
        <p-card header="Product Form" subheader="You Can Create & Edit Products">
            <div class="grid">
                <div class="col">
                    <p-toolbar>
                        <div class="p-toolbar-group-right"></div>
                        <div class="p-toolbar-group-right">
                            <p-button
                                [label]="editMode ? 'Update' : 'Create'"
                                icon="pi pi-plus"
                                [rounded]="true"
                                class="mr-2 min-w-0 border-round"
                                size="small"
                                (click)="onSubmit()"
                                severity="success"
                            />
                            <p-button label="Cancel" icon="pi pi-arrow-circle-left" class="mr-2" size="small" (click)="onCancel()" severity="danger" />
                        </div>
                    </p-toolbar>
                </div>
            </div>

            <div class="formgrid grid p-fluid pt-3" [formGroup]="productForm">
                <div class="field col-4">
                    <label for="name">Name</label>
                    <input id="name" type="text" formControlName="name" pInputText />
                    <small *ngIf="productForm.get('name')?.invalid && isSubmitted" class="p-error">name required</small>
                </div>
                <div class="field col-4">
                    <label for="brand">Brand</label>
                    <input id="brand" type="text" formControlName="brand" pInputText />
                    <small *ngIf="productForm.get('brand')?.invalid && isSubmitted" class="p-error">brand required</small>
                </div>
                <div class="field col-4">
                    <label for="price">Price</label>
                    <p-inputNumber inputId="price" formControlName="price" />
                    <small *ngIf="productForm.get('price')?.invalid && isSubmitted" class="p-error">price required</small>
                </div>
                <div class="field col-6">
                    <label for="countInStock">CountInStock</label>
                    <p-inputNumber inputId="countInStock" formControlName="countInStock" />
                    <small *ngIf="productForm.get('countInStock')?.invalid && isSubmitted" class="p-error">count in stock required</small>
                </div>
                <div class="field col-4">
                    <label for="category">Category</label>
                    <p-dropdown
                        [options]="category"
                        optionLabel="name"
                        formControlName="categorie"
                        placeholder="Select a Category"
                        [filter]="true"
                        filterBy="name"
                        [showClear]="true"
                        placeholder="Select a Category"
                    />
                    <small *ngIf="productForm.get('categorie')?.invalid && isSubmitted" class="p-error">category is required</small>
                </div>
                <div class="field col-2">
                    <label for="isFeatured">isfeatured</label><br />
                    <p-inputSwitch formControlName="isFeatured" />
                </div>
                <div class="field col-12">
                    <label for="description">Description</label>
                    <textarea rows="5" cols="30" formControlName="description" pInputTextarea></textarea>
                    <small *ngIf="productForm.get('description')?.invalid && isSubmitted" class="p-error">description is required</small>
                </div>
                <div class="field col-12">
                    <label for="richDescription">Rich Description</label>
                    <p-editor formControlName="richDescription" [style]="{ height: '320px' }" />
                </div>
            </div>
        </p-card>
    </div>
</div>
