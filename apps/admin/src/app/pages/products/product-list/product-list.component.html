<p-toast />
<div class="admin-page">
    <div class="card flex justify-content-center">
        <p-card header="Products" subheader="List Of Products">
            <div class="grid">
                <div class="col">
                    <p-toolbar>
                        <div class="p-toolbar-group-left">
                            <p-button routerLink="product-form" label="New" icon="pi pi-plus" class="mr-2" severity="success" />
                        </div>
                    </p-toolbar>
                </div>
            </div>
            <div class="grid">
                <div class="col">
                    <p-table [value]="products" styleClass="p-datatable-gridlines" [tableStyle]="{ 'min-width': '50rem' }">
                        <ng-template pTemplate="header">
                            <tr>
                                <th>Name</th>
                                <th>Image</th>
                                <th>Stock</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Date</th>
                                <th></th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-product>
                            <tr>
                                <td>{{ product.name }}</td>
                                <td><img [src]="product.image" [alt]="product.name" width="100" /></td>
                                <td>{{ product.countInStock }}</td>
                                <td>{{ product.categorie?.name }}</td>
                                <td>
                                    {{ product.price | currency }}
                                </td>
                                <td>{{ product.dateCreated | date }}</td>
                                <td>
                                    <p-button icon="pi pi-trash" (click)="deleteProduct(product._id)" size="small" class="mr-2" severity="danger" />
                                    <p-button icon="pi pi-pencil" class="mr-2" size="small" severity="success" />
                                </td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>
        </p-card>
    </div>
</div>

<p-confirmDialog />
